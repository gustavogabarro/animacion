<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ciudadano.news - Animación Final</title>
    <!-- 1. EL MOTOR: Sin esto, el navegador no entiende el JSON de la animación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.9.0/lottie.min.js"></script>
    <style>
        body { background-color: #222; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        canvas { background-color: transparent; border: 1px solid #444; max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; margin: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        #recStatus { display: block; margin-top: 10px; color: #ffa500; font-style: italic; }
    </style>
</head>
<body>

    <!-- 2. EL LIENZO: El canvas donde se dibuja la 'animación real' -->
    <canvas id="scene" width="1920" height="1080"></canvas>

    <div class="controls">
        <!-- Botones definidos en tus fuentes -->
        <button class="replay" id="replayBtn" onclick="restart()">↻ Replay</button>
        <button id="recBtn">Grabar Video (WebM Alfa)</button>
        <button id="wavBtn">Exportar Audio WAV</button>
        <span id="recStatus">Listo</span>
    </div>

    <script>
        // 3. LOS DATOS: Aquí está el JSON completo que subiste (Ciudadano.news Logo Animation)
        const animationData = {"v":"5.9.0","fr":30,"ip":0,"op":105,"w":1920,"h":1080,"nm":"Ciudadano.news Logo Animation", /* ... resto del JSON de tus fuentes 8-55 ... */ "layers":[{"ddd":0,"ind":16,"ty":4,"nm":"cnews_gold","sr":1,"ao":0,"ks":{"o":{"a":1,"k":[{"t":29,"s":,"e":,"i":{"x":[0.4],"y":[1.0]},"o":{"x":[0.6],"y":[0.0]}},{"t":35,"s":,"e":,"i":{"x":[0.4],"y":[1.0]},"o":{"x":[0.6],"y":[0.0]}}]},"r":{"a":0,"k":0},"p":{"a":0,"k":},"a":{"a":0,"k":[53.0,82.0,0]},"s":{"a":1,"k":[{"t":29,"s":[529.2452830188679,529.2073170731707,100],"e":[1039.2452830188677,1039.170731707317,100],"i":{"x":[0.175],"y":[1.275]},"o":{"x":[0.6],"y":[0.0]}},{"t":35,"s":[1039.2452830188677,1039.170731707317,100],"e":[962.2641509433961,962.1951219512194,100],"i":{"x":[0.4],"y":[1.0]},"o":{"x":[0.6],"y":[0.0]}},{"t":39,"s":[962.2641509433961,962.1951219512194,100],"e":[962.2641509433961,962.1951219512194,100],"i":{"x":[0.4],"y":[1.0]},"o":{"x":[0.6],"y":[0.0]}}]}},"shapes":[] /* He simplificado el JSON aquí por espacio, pero en tu archivo debe ir el contenido completo de las fuentes 8 a 55 */ }]};

        const canvas = document.getElementById('scene');
        const recBtn = document.getElementById('recBtn');
        const recStatus = document.getElementById('recStatus');
        let anim;
        let capturing = false;
        let recordedChunks = [];

        // 4. FUNCIONES DE DIBUJO: Implementación real de buildScene y runSequence
        function buildScene(c) {
            if (anim) anim.destroy();
            anim = lottie.loadAnimation({
                container: null,
                renderer: 'canvas',
                loop: false,
                autoplay: false,
                animationData: animationData,
                rendererSettings: {
                    canvas: c,
                    preserveAspectRatio: 'xMidYMid meet',
                    clearCanvas: true
                }
            });
        }

        function runSequence() {
            if (anim) anim.play();
        }

        // Función restart corregida (Fuente 2, 5)
        function restart() {
            const rb = document.getElementById('replayBtn');
            if (rb) rb.style.opacity = '1';
            buildScene(canvas);
            void canvas.offsetWidth;
            runSequence();
        }

        // 5. GRABACIÓN (Fuente 3, 6): Solo funciona en Chrome para WebM Alfa (Fuente 1)
        recBtn.addEventListener('click', async () => {
            if (capturing) return;
            capturing = true;
            recBtn.disabled = true;
            recStatus.textContent = 'Preparando...'; // Estado según fuente 3

            const stream = canvas.captureStream(30);
            const options = {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 15000000 
            };

            const mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'animacion_transparente.webm';
                a.click();
                recBtn.disabled = false;
                capturing = false;
                recStatus.textContent = '¡Video descargado!';
            };

            mediaRecorder.start();
            restart();
            recStatus.textContent = 'Grabando animación...';

            // Detención automática tras 3.5 segundos (Frame 105 / 30fps)
            setTimeout(() => {
                if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
            }, 3800);
        });

        // Inicializar al cargar
        window.onload = () => buildScene(canvas);

    </script>
</body>
</html>
