<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ciudadano.news — Logo Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent !important;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 1080px;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-full {
      position: absolute;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      white-space: nowrap;
    }

    .glyph {
      display: inline-flex;
      align-items: flex-end;
      flex-shrink: 0;
      opacity: 0.15;
      transition: opacity 0.07s ease, filter 0.07s ease, transform 0.07s ease;
      transform-origin: bottom center;
    }

    .glyph.lit {
      opacity: 1;
      transform: scale(1.06);
    }

    .glyph.settled {
      transform: scale(1);
    }

    .glyph.white.lit {
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
    }

    .glyph.yellow.lit {
      filter: drop-shadow(0 0 8px rgba(245, 166, 35, 0.4));
    }

    .glyph-dot {
      display: inline-flex;
      align-items: flex-end;
      padding-bottom: 2px;
      opacity: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 0px #ffbf3c);
      transition: filter 0.15s ease, transform 0.15s ease;
      transform-origin: bottom center;
    }

    .glyph-dot.pulse {
      filter: drop-shadow(0 0 14px #ffbf3c) drop-shadow(0 0 28px rgba(255, 191, 60, 0.5));
      transform: scale(1.35);
    }

    .glyph-dot.settled {
      transform: scale(1);
      filter: drop-shadow(0 0 4px rgba(255, 191, 60, 0.4));
    }

    .logo-compact {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    .logo-compact.pop-in {
      animation: popIn 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      pointer-events: auto;
    }

    .logo-compact svg {
      width: 100px;
      height: auto;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.55) translateY(8px);
      }

      65% {
        opacity: 1;
        transform: scale(1.08) translateY(-2px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo-full.fade-out {
      animation: fadeOutFull 0.28s ease-in forwards;
    }

    @keyframes fadeOutFull {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(0.9);
      }
    }

    .glow-ring {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 191, 60, 0.07) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
    }

    .glow-ring.active {
      animation: glowPulse 2.8s ease-in-out infinite;
    }

    @keyframes glowPulse {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.4);
      }
    }

    .replay {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.35);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 7px 22px;
      cursor: pointer;
      border-radius: 2px;
      font-family: Arial, sans-serif;
      transition: border-color 0.25s, color 0.25s, opacity 0.4s;
      opacity: 0;
    }

    .replay:hover {
      border-color: #F5A623;
      color: #F5A623;
    }

    #recPanel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      z-index: 999;
    }

    #recStatus {
      color: #F5A623;
      font-size: 10px;
      letter-spacing: 1px;
      font-family: Arial, sans-serif;
      min-height: 14px;
      text-align: right;
    }

    #recNote {
      color: rgba(255, 255, 255, 0.2);
      font-size: 10px;
      letter-spacing: 2px;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      text-align: right;
    }

    #recBtn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 2px;
      font-family: Arial, sans-serif;
      transition: border-color 0.25s, color 0.25s;
    }

    #recBtn:hover {
      border-color: #F5A623;
      color: #F5A623;
    }

    #recBtn:disabled {
      opacity: 0.3;
      cursor: default;
    }
  </style>
</head>

  <script>
    const STEP = 40;
    const FIRST_LETTER = 80;
    const leftLetters = ['l8', 'l7', 'l6', 'l5', 'l4', 'l3', 'l2', 'l1', 'l0']; // o → C
    const rightLetters = ['n0', 'n1', 'n2', 'n3'];                            // n → s

    // ══════════════════════════════════════════════════════════
    //  AUDIO ENGINE — Sophisticated millennial sound design
    //  Architecture: reverb convolution + stereo field +
    //  pentatonic scale + layered harmonic tones + bell transient
    // ══════════════════════════════════════════════════════════
    let audioCtx = null;
    let reverbNode = null;
    let masterGain = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    // ── Convolution reverb (synthetic impulse response) ──
    function buildReverb(ctx) {
      const len = ctx.sampleRate * 1.8;
      const ir = ctx.createBuffer(2, len, ctx.sampleRate);
      for (let c = 0; c < 2; c++) {
        const ch = ir.getChannelData(c);
        for (let i = 0; i < len; i++) {
          // Exponential decay with early reflections
          const decay = Math.pow(1 - i / len, 2.2);
          ch[i] = (Math.random() * 2 - 1) * decay * (i < 400 ? 0.4 : 1);
        }
      }
      const conv = ctx.createConvolver();
      conv.buffer = ir;
      return conv;
    }

    // ── Master chain: compressor → gain → destination ──
    function getMaster(ctx) {
      if (masterGain) return masterGain;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -14;
      comp.knee.value = 8;
      comp.ratio.value = 3;
      comp.attack.value = 0.003;
      comp.release.value = 0.18;

      reverbNode = buildReverb(ctx);
      const reverbGain = ctx.createGain();
      reverbGain.gain.value = 0.22; // wet mix

      masterGain = ctx.createGain();
      masterGain.gain.value = 0.82;

      // Dry chain
      comp.connect(masterGain);
      masterGain.connect(ctx.destination);

      // Wet reverb chain
      comp.connect(reverbNode);
      reverbNode.connect(reverbGain);
      reverbGain.connect(ctx.destination);

      return comp; // return input node
    }

    // ── Utility: create a bell-like tone with harmonics ──
    // Uses additive synthesis: fundamental + 2nd + 3rd partial
    function bell(ctx, master, freq, vol, attack, decay, pan = 0) {
      const now = ctx.currentTime;
      const panner = ctx.createStereoPanner();
      panner.pan.value = pan;
      panner.connect(master);

      [[1, 1.0], [2.756, 0.35], [5.404, 0.15]].forEach(([ratio, rel]) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = freq * ratio;
        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(vol * rel, now + attack);
        g.gain.exponentialRampToValueAtTime(0.0001, now + attack + decay);
        o.connect(g); g.connect(panner);
        o.start(now); o.stop(now + attack + decay + 0.05);
      });
    }

    // ── D major pentatonic scale (warm, modern, positive) ──
    const SCALE = [293.66, 329.63, 369.99, 440, 493.88, 587.33, 659.25, 739.99, 880];

    // ── DOT SPARK — deep sub pulse + filtered synth transient ──────
    // Inspirado en sonidos de marca tipo Apple/Stripe: impacto físico
    // pero limpio, sin distorsión, con espacio y aire.
    function playDotSpark() {
      const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;

      // ① Deep sub pulse — da presencia física sin ser agresivo
      const sub = ctx.createOscillator();
      const subG = ctx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(55, now);         // A1 — muy grave, casi se siente más que se escucha
      sub.frequency.exponentialRampToValueAtTime(42, now + 0.15);
      subG.gain.setValueAtTime(0, now);
      subG.gain.linearRampToValueAtTime(0.45, now + 0.006);
      subG.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
      sub.connect(subG); subG.connect(m);
      sub.start(now); sub.stop(now + 0.35);

      // ② Mid punch — sine en A2, da cuerpo sin saturar
      const mid = ctx.createOscillator();
      const midG = ctx.createGain();
      mid.type = 'sine';
      mid.frequency.setValueAtTime(110, now);
      mid.frequency.exponentialRampToValueAtTime(80, now + 0.1);
      midG.gain.setValueAtTime(0, now);
      midG.gain.linearRampToValueAtTime(0.28, now + 0.005);
      midG.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      mid.connect(midG); midG.connect(m);
      mid.start(now); mid.stop(now + 0.2);

      // ③ Synth transient — tono filtrado que abre muy rápido y desaparece
      // Crea la sensación de "activación" sin agresividad
      const syn = ctx.createOscillator();
      const synG = ctx.createGain();
      const synF = ctx.createBiquadFilter();
      synF.type = 'bandpass';
      synF.frequency.setValueAtTime(1200, now);
      synF.Q.value = 1.8;
      syn.type = 'triangle';                         // triangle es más suave que sawtooth
      syn.frequency.setValueAtTime(440, now);         // A4
      syn.frequency.exponentialRampToValueAtTime(420, now + 0.08);
      synG.gain.setValueAtTime(0, now);
      synG.gain.linearRampToValueAtTime(0.18, now + 0.004);
      synG.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
      syn.connect(synF); synF.connect(synG); synG.connect(m);
      syn.start(now); syn.stop(now + 0.16);

      // ④ Air shimmer — muy suave, da sensación de espacio
      const shimBuf = ctx.createBuffer(2, ctx.sampleRate * 0.04, ctx.sampleRate);
      for (let c = 0; c < 2; c++) {
        const ch = shimBuf.getChannelData(c);
        for (let i = 0; i < ch.length; i++) {
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / ch.length, 4) * (c === 0 ? 1 : -1);
        }
      }
      const shim = ctx.createBufferSource();
      const shimG = ctx.createGain();
      const shimF = ctx.createBiquadFilter();
      shimF.type = 'highpass'; shimF.frequency.value = 5000;
      shim.buffer = shimBuf;
      shimG.gain.setValueAtTime(0.06, now);
      shimG.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
      shim.connect(shimF); shimF.connect(shimG); shimG.connect(m);
      shim.start(now);
    }

    // ── LETTER TICKS — Rhodes-style electric piano ─────────────────
    // El Rhodes tiene un ataque percusivo con decay cálido —
    // se logra con sine + FM leve + filtro suave. Sofisticado y musical.
    function playLetterTick(stepIndex, totalSteps) {
      const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;
      const freq = SCALE[Math.min(stepIndex, SCALE.length - 1)];

      // Modulador FM — crea el "click" inicial del Rhodes
      const mod = ctx.createOscillator();
      const modG = ctx.createGain();
      mod.type = 'sine';
      mod.frequency.value = freq * 1.4;             // ratio de modulación rhodes-like
      modG.gain.setValueAtTime(0, now);
      modG.gain.linearRampToValueAtTime(freq * 2.8, now + 0.002);  // profundidad FM alta al inicio
      modG.gain.exponentialRampToValueAtTime(freq * 0.1, now + 0.06); // decae rápido → sonido limpio
      modG.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
      mod.connect(modG);

      // Carrier — tono principal
      const car = ctx.createOscillator();
      const carG = ctx.createGain();
      car.type = 'sine';
      car.frequency.value = freq;

      // Conectar modulador al parámetro de frecuencia del carrier (FM real)
      modG.connect(car.frequency);

      // Envelope del carrier — ataque rápido, decay suave tipo piano eléctrico
      carG.gain.setValueAtTime(0, now);
      carG.gain.linearRampToValueAtTime(0.18, now + 0.004);
      carG.gain.exponentialRampToValueAtTime(0.05, now + 0.12);
      carG.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);

      // Filtro suave — quita asperezas
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = 3200;
      filt.Q.value = 0.5;

      car.connect(carG); carG.connect(filt); filt.connect(m);
      mod.start(now); mod.stop(now + 0.2);
      car.start(now); car.stop(now + 0.5);

      // Brillo suave en notas más agudas (steps 5+)
      if (stepIndex >= 5) {
        const shine = ctx.createOscillator();
        const shineG = ctx.createGain();
        shine.type = 'sine';
        shine.frequency.value = freq * 2;
        shineG.gain.setValueAtTime(0, now);
        shineG.gain.linearRampToValueAtTime(0.04, now + 0.004);
        shineG.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
        shine.connect(shineG); shineG.connect(m);
        shine.start(now); shine.stop(now + 0.25);
      }
    }

    // ── FINAL IMPACT — Rhodes FM chord + sub resolution ──────────
    // Mismo lenguaje que el resto: sub grave + FM synthesis.
    // Un acorde D major (D4-F#4-A4) con voicing amplio, 
    // cada nota en FM como el Rhodes, escalonadas 40ms.
    // Sella el sonido con un pad suave que se desvanece.
    function playFinalImpact() {
      const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;

      // ① Sub resolution — nota raíz D2, da peso y cierre
      const sub = ctx.createOscillator();
      const subG = ctx.createGain();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(73.42, now);    // D2
      sub.frequency.exponentialRampToValueAtTime(69, now + 0.3);
      subG.gain.setValueAtTime(0, now);
      subG.gain.linearRampToValueAtTime(0.5, now + 0.008);
      subG.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      sub.connect(subG); subG.connect(m);
      sub.start(now); sub.stop(now + 0.6);

      // ② Acorde Rhodes FM: D4, F#4, A4 — escalonado 40ms
      [
        { freq: 293.66, delay: 0, pan: -0.35 }, // D4
        { freq: 369.99, delay: 0.04, pan: 0 }, // F#4
        { freq: 440, delay: 0.08, pan: 0.35 }, // A4
      ].forEach(({ freq, delay, pan }) => {
        const t = now + delay;
        const panner = ctx.createStereoPanner();
        panner.pan.value = pan;
        panner.connect(m);

        // FM modulator — da el click inicial del Rhodes
        const mod = ctx.createOscillator();
        const modG = ctx.createGain();
        mod.type = 'sine';
        mod.frequency.value = freq * 1.4;
        modG.gain.setValueAtTime(0, t);
        modG.gain.linearRampToValueAtTime(freq * 3.2, t + 0.002);
        modG.gain.exponentialRampToValueAtTime(freq * 0.08, t + 0.07);
        modG.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
        mod.connect(modG);

        // FM carrier — cuerpo cálido con larga cola
        const car = ctx.createOscillator();
        const carG = ctx.createGain();
        car.type = 'sine';
        car.frequency.value = freq;
        modG.connect(car.frequency);
        carG.gain.setValueAtTime(0, t);
        carG.gain.linearRampToValueAtTime(0.22, t + 0.005);
        carG.gain.exponentialRampToValueAtTime(0.06, t + 0.2);
        carG.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);

        const filt = ctx.createBiquadFilter();
        filt.type = 'lowpass'; filt.frequency.value = 4000; filt.Q.value = 0.4;

    // Fix restart to use buildScene
    function restart() {
      const rb = document.getElementById('replayBtn');
      if (rb) rb.style.opacity = '0';
      buildScene(document.getElementById('scene'));
      void document.getElementById('scene').offsetWidth;
      runSequence();

    // ── GRABACIÓN ───────────────────────────────────────────────────
    const recBtn = document.getElementById('recBtn');
    const recStatus = document.getElementById('recStatus');
    let capturing = false;

    recBtn.addEventListener('click', async () => {
      if (capturing) return;
      capturing = true;
      recBtn.disabled = true;
      recStatus.textContent = 'Preparando...';

      const FPS = 30;
      const DURATION = 3.8;
      const TOTAL_F = Math.ceil(FPS * DURATION);
      const FRAME_MS = 1000 / FPS;

      const scene = document.getElementById('scene');
      const W = scene.offsetWidth;
      const H = scene.offsetHeight;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d', { alpha: true });

      const stream = canvas.captureStream(FPS);
      const chunks = [];
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ? 'video/webm;codecs=vp9' : 'video/webm';
      const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 15_000_000 });
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'ciudadano-news-logo.webm'; a.click();
        URL.revokeObjectURL(url);
        recStatus.textContent = '&#10003; Descargado!';
        recBtn.disabled = false;
        recBtn.textContent = '&#9679; Grabar';
        recBtn.style.borderColor = '';
        recBtn.style.color = '';
        capturing = false;
        setTimeout(() => recStatus.textContent = '', 4000);
      };

      recorder.start(100);
      recBtn.textContent = '● Grabando...';
      recBtn.style.borderColor = '#F5A623';
      recBtn.style.color = '#F5A623';

      // Restart animation
      restart();
      const startTime = performance.now();

      for (let f = 0; f < TOTAL_F; f++) {
        const target = startTime + f * FRAME_MS;
        const diff = target - performance.now();
        if (diff > 0) await new Promise(r => setTimeout(r, diff));

        // Draw current DOM state onto canvas via SVG foreignObject
        const sceneEl = document.getElementById('scene');
        const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;height:${H}px;overflow:hidden;background:transparent;">
            ${sceneEl.innerHTML}
          </div>
        </foreignObject>
      </svg>`;

        const blob = new Blob([svgStr], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        await new Promise((res) => {
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, W, H);
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            res();
          };
          img.onerror = () => { URL.revokeObjectURL(url); res(); };
          img.src = url;
        });

        recStatus.textContent = `Capturando ${Math.round((f + 1) / TOTAL_F * 100)}% (${f + 1}/${TOTAL_F})`;
      }

      recorder.stop();
    });

    // ── EXPORTAR AUDIO WAV ──────────────────────────────────────────
    // Renderiza el audio offline (más rápido que tiempo real) y descarga WAV
    document.getElementById('wavBtn').addEventListener('click', async () => {
      const wavBtn = document.getElementById('wavBtn');

      wavBtn.disabled = true;
      wavBtn.textContent = '⏳ Renderizando...';
      recStatus.textContent = 'Generando audio...';

      const DURATION = 3.8;
      const SAMPLE_RATE = 44100;

      // OfflineAudioContext para renderizar sin tiempo real
      const offCtx = new OfflineAudioContext(2, SAMPLE_RATE * DURATION, SAMPLE_RATE);

      // Master compressor
      const comp = offCtx.createDynamicsCompressor();
      comp.threshold.value = -14; comp.knee.value = 8;
      comp.ratio.value = 3; comp.attack.value = 0.003; comp.release.value = 0.18;

      // Reverb
      const irLen = SAMPLE_RATE * 1.8;
      const ir = offCtx.createBuffer(2, irLen, SAMPLE_RATE);
      for (let c = 0; c < 2; c++) {
        const ch = ir.getChannelData(c);
        for (let i = 0; i < irLen; i++) {
          ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.2) * (i < 400 ? 0.4 : 1);
        }
      }
      const reverb = offCtx.createConvolver();
      reverb.buffer = ir;
      const reverbGain = offCtx.createGain();
      reverbGain.gain.value = 0.22;
      comp.connect(offCtx.destination);
      comp.connect(reverb); reverb.connect(reverbGain); reverbGain.connect(offCtx.destination);

      const m = comp; // master input

      // ── Helpers ──
      function osc(type, freq, startT, endT, gainEnv) {
        const o = offCtx.createOscillator();
        const g = offCtx.createGain();
        o.type = type; o.frequency.value = freq;
        gainEnv(g.gain, startT);
        o.connect(g); g.connect(m);
        o.start(startT); o.stop(endT);
      }
      function freqRamp(o, f1, f2, t1, t2) {
        o.frequency.setValueAtTime(f1, t1);
        o.frequency.exponentialRampToValueAtTime(f2, t2);
      }

      // ── DOT SPARK — deep sub pulse + filtered synth transient ──
      const t0 = 0;

      // Sub pulse profundo
      const sub0 = offCtx.createOscillator();
      const sub0G = offCtx.createGain();
      sub0.type = 'sine';
      sub0.frequency.setValueAtTime(55, t0);
      sub0.frequency.exponentialRampToValueAtTime(42, t0 + 0.15);
      sub0G.gain.setValueAtTime(0, t0);
      sub0G.gain.linearRampToValueAtTime(0.45, t0 + 0.006);
      sub0G.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.32);
      sub0.connect(sub0G); sub0G.connect(m);
      sub0.start(t0); sub0.stop(t0 + 0.35);

      // Mid punch
      const mid0 = offCtx.createOscillator();
      const mid0G = offCtx.createGain();
      mid0.type = 'sine';
      mid0.frequency.setValueAtTime(110, t0);
      mid0.frequency.exponentialRampToValueAtTime(80, t0 + 0.1);
      mid0G.gain.setValueAtTime(0, t0);
      mid0G.gain.linearRampToValueAtTime(0.28, t0 + 0.005);
      mid0G.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
      mid0.connect(mid0G); mid0G.connect(m);
      mid0.start(t0); mid0.stop(t0 + 0.2);

      // Synth transient filtrado
      const syn0 = offCtx.createOscillator();
      const syn0G = offCtx.createGain();
      const syn0F = offCtx.createBiquadFilter();
      syn0F.type = 'bandpass'; syn0F.frequency.value = 1200; syn0F.Q.value = 1.8;
      syn0.type = 'triangle'; syn0.frequency.setValueAtTime(440, t0);
      syn0.frequency.exponentialRampToValueAtTime(420, t0 + 0.08);
      syn0G.gain.setValueAtTime(0, t0);
      syn0G.gain.linearRampToValueAtTime(0.18, t0 + 0.004);
      syn0G.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.14);
      syn0.connect(syn0F); syn0F.connect(syn0G); syn0G.connect(m);
      syn0.start(t0); syn0.stop(t0 + 0.16);

      // Air shimmer estéreo
      const shimBuf = offCtx.createBuffer(2, Math.floor(SAMPLE_RATE * 0.04), SAMPLE_RATE);
      for (let c = 0; c < 2; c++) {
        const ch = shimBuf.getChannelData(c);
        for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / ch.length, 4) * (c === 0 ? 1 : -1);
      }
      const shim0 = offCtx.createBufferSource();
      const shim0G = offCtx.createGain();
      const shim0F = offCtx.createBiquadFilter();
      shim0F.type = 'highpass'; shim0F.frequency.value = 5000;
      shim0.buffer = shimBuf;
      shim0G.gain.setValueAtTime(0.06, t0);
      shim0G.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.04);
      shim0.connect(shim0F); shim0F.connect(shim0G); shim0G.connect(m);
      shim0.start(t0);

      // ── LETTER TICKS — Rhodes FM electric piano ──
      const SCALE = [293.66, 329.63, 369.99, 440, 493.88, 587.33, 659.25, 739.99, 880];
      const FIRST = 0.08, STEP = 0.04;
      for (let i = 0; i < 9; i++) {
        const t = FIRST + i * STEP;
        const freq = SCALE[Math.min(i, SCALE.length - 1)];

        // FM modulator
        const mod = offCtx.createOscillator();
        const modG = offCtx.createGain();
        mod.type = 'sine'; mod.frequency.value = freq * 1.4;
        modG.gain.setValueAtTime(0, t);
        modG.gain.linearRampToValueAtTime(freq * 2.8, t + 0.002);
        modG.gain.exponentialRampToValueAtTime(freq * 0.1, t + 0.06);
        modG.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
        mod.connect(modG);

        // FM carrier
        const car = offCtx.createOscillator();
        const carG = offCtx.createGain();
        car.type = 'sine'; car.frequency.value = freq;
        modG.connect(car.frequency);
        carG.gain.setValueAtTime(0, t);
        carG.gain.linearRampToValueAtTime(0.18, t + 0.004);
        carG.gain.exponentialRampToValueAtTime(0.05, t + 0.12);
        carG.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
        const flt = offCtx.createBiquadFilter();
        flt.type = 'lowpass'; flt.frequency.value = 3200; flt.Q.value = 0.5;

        if (i >= 5) {
          const sh = offCtx.createOscillator();
          const shG = offCtx.createGain();
          sh.type = 'sine'; sh.frequency.value = freq * 2;
          shG.gain.setValueAtTime(0, t);
          shG.gain.linearRampToValueAtTime(0.04, t + 0.004);
          shG.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
          sh.connect(shG); shG.connect(m);
          sh.start(t); sh.stop(t + 0.25);

      const tImpact = 0.82;

      // Sub resolution D2
      const subF = offCtx.createOscillator();
      const subFG = offCtx.createGain();
      subF.type = 'sine';
      subF.frequency.setValueAtTime(73.42, tImpact);
      subF.frequency.exponentialRampToValueAtTime(69, tImpact + 0.3);
      subFG.gain.setValueAtTime(0, tImpact);
      subFG.gain.linearRampToValueAtTime(0.5, tImpact + 0.008);
      subFG.gain.exponentialRampToValueAtTime(0.001, tImpact + 0.55);
      subF.connect(subFG); subFG.connect(m);
      subF.start(tImpact); subF.stop(tImpact + 0.6);

      // Acorde Rhodes FM: D4, F#4, A4
      [{ freq: 293.66, delay: 0, pan: -0.35 },
      { freq: 369.99, delay: 0.04, pan: 0 },
      { freq: 440, delay: 0.08, pan: 0.35 }
      ].forEach(({ freq, delay, pan }) => {
        const t = tImpact + delay;
        const panner = offCtx.createStereoPanner();
        panner.pan.value = pan; panner.connect(m);

        const mod = offCtx.createOscillator();
        const modG = offCtx.createGain();
        mod.type = 'sine'; mod.frequency.value = freq * 1.4;
        modG.gain.setValueAtTime(0, t);
        modG.gain.linearRampToValueAtTime(freq * 3.2, t + 0.002);
        modG.gain.exponentialRampToValueAtTime(freq * 0.08, t + 0.07);
        modG.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
        mod.connect(modG);

        const car = offCtx.createOscillator();
        const carG = offCtx.createGain();
        car.type = 'sine'; car.frequency.value = freq;
        modG.connect(car.frequency);
        carG.gain.setValueAtTime(0, t);
        carG.gain.linearRampToValueAtTime(0.22, t + 0.005);
        carG.gain.exponentialRampToValueAtTime(0.06, t + 0.2);
        carG.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
        const flt = offCtx.createBiquadFilter();
        flt.type = 'lowpass'; flt.frequency.value = 4000; flt.Q.value = 0.4;
        car.connect(carG); carG.connect(flt); flt.connect(panner);
        mod.start(t); mod.stop(t + 0.25);
        car.start(t); car.stop(t + 1.1);
      });

      // Pad de cierre — D5 detuned
      [293.66 * 2, 293.66 * 2 * 1.004].forEach((freq) => {

        const padG = offCtx.createGain();
        const padF = offCtx.createBiquadFilter();
        padF.type = 'lowpass'; padF.frequency.value = 1800;
        pad.type = 'sine'; pad.frequency.value = freq;
        padG.gain.setValueAtTime(0, tImpact + 0.06);
        padG.gain.linearRampToValueAtTime(0.06, tImpact + 0.18);
        padG.gain.exponentialRampToValueAtTime(0.0001, tImpact + 1.6);
        pad.connect(padF); padF.connect(padG); padG.connect(m);
        pad.start(tImpact + 0.06); pad.stop(tImpact + 1.7);

      const rendered = await offCtx.startRendering();

      function encodeWAV(audioBuffer) {
        const numCh = audioBuffer.numberOfChannels;
        const numSamples = audioBuffer.length;
        const sampleRate = audioBuffer.sampleRate;
        const bitsPerSample = 16;
        const byteRate = sampleRate * numCh * bitsPerSample / 8;
        const blockAlign = numCh * bitsPerSample / 8;
        const dataSize = numSamples * numCh * bitsPerSample / 8;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);
        function writeStr(off, str) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
        writeStr(0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeStr(8, 'WAVE');
        writeStr(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numCh, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, byteRate, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitsPerSample, true);
        writeStr(36, 'data');
        view.setUint32(40, dataSize, true);
        let offset = 44;
        const channels = [];
        for (let c = 0; c < numCh; c++) channels.push(audioBuffer.getChannelData(c));
        for (let i = 0; i < numSamples; i++) {
          for (let c = 0; c < numCh; c++) {
            const s = Math.max(-1, Math.min(1, channels[c][i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            offset += 2;
          }
        }
        return buffer;
      }

      const wavBuffer = encodeWAV(rendered);
      const wavBlob = new Blob([wavBuffer], { type: 'audio/wav' });
      const wavUrl = URL.createObjectURL(wavBlob);

    // ── EXPORTAR SECUENCIA PNG (TAR) PARA AFTER EFFECTS ─────────────

    class TarBuilder {
      constructor() { this.buffers = []; }
      addFile(name, uint8array) {
        const header = new Uint8Array(512);
        let offset = 0;
        const writeString = (str, len) => {
          for (let i = 0; i < str.length && i < len; i++) header[offset + i] = str.charCodeAt(i);
          offset += len;
        };
        writeString(name, 100);
        writeString("0000644\0", 8);
        writeString("0000000\0", 8);
        writeString("0000000\0", 8);
        writeString(uint8array.length.toString(8).padStart(11, '0') + "\0", 12);
        writeString("00000000000\0", 12);
        writeString("        ", 8);
        header[offset++] = 48; // '0'
        offset += 99;
        writeString("ustar\0", 6);
        writeString("00", 2);
        let chksum = 0;
        for (let i = 0; i < 512; i++) chksum += header[i];
        const chksumStr = chksum.toString(8).padStart(6, '0') + "\0 ";
        for (let i = 0; i < 8; i++) header[148 + i] = chksumStr.charCodeAt(i);
        this.buffers.push(header);
        this.buffers.push(uint8array);
        const paddingLength = (512 - (uint8array.length % 512)) % 512;
        if (paddingLength > 0) this.buffers.push(new Uint8Array(paddingLength));
      }
      getBlob() {
        this.buffers.push(new Uint8Array(1024));
        return new Blob(this.buffers, { type: 'application/x-tar' });
      }
    }

    function dataURLtoUint8Array(dataUrl) {
      const bstr = atob(dataUrl.split(',')[1]);
      const u8arr = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
      return u8arr;
    }

    document.getElementById('zipBtn').addEventListener('click', async () => {
      try {
        if (capturing) return;
        capturing = true;
        const zipBtn = document.getElementById('zipBtn');
        zipBtn.disabled = true;
        recStatus.textContent = 'Preparando Archivos...';

        const FPS = 30;
        const DURATION = 3.8;
        const TOTAL_F = Math.ceil(FPS * DURATION);
        const FRAME_MS = 1000 / FPS;

        const scene = document.getElementById('scene');
        const W = scene.offsetWidth;
        const H = scene.offsetHeight;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d', { alpha: true });

        const tar = new TarBuilder();

        let styleContent = '';
        for (const sheet of document.styleSheets) {
          try {
            for (const rule of sheet.cssRules) styleContent += rule.cssText + '\n';
          } catch (e) { }
        }

        restart();
        const startTime = performance.now();

        for (let f = 0; f < TOTAL_F; f++) {
          const target = startTime + f * FRAME_MS;
          const diff = target - performance.now();
          if (diff > 0) await new Promise(r => setTimeout(r, diff));

          const sceneEl = document.getElementById('scene');
          const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
          <foreignObject width="100%" height="100%">
            <div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;height:${H}px;overflow:hidden;background:transparent;">
              <style>${styleContent}</style>
              ${sceneEl.innerHTML}
            </div>
          </foreignObject>
        </svg>`;

          const blob = new Blob([svgStr], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          await new Promise((res, rej) => {
            const img = new Image();
            img.onload = () => {
              ctx.clearRect(0, 0, W, H);
              ctx.drawImage(img, 0, 0);
              URL.revokeObjectURL(url);
              res();
            };
            img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("Fallo al cargar imagen SVG")); };
            img.src = url;
          });

          const dataUrl = canvas.toDataURL('image/png');
          const u8arr = dataURLtoUint8Array(dataUrl);
          const frameName = `frame_${String(f).padStart(3, '0')}.png`;
          tar.addFile(frameName, u8arr);

          recStatus.textContent = `Generando PNG ${Math.round((f + 1) / TOTAL_F * 100)}% (${f + 1}/${TOTAL_F})`;
        }

        recStatus.textContent = 'Empaquetando TAR...';

        const tarBlob = tar.getBlob();
        const tarUrl = URL.createObjectURL(tarBlob);
        const a = document.createElement('a');
        a.href = tarUrl;
        a.download = 'ciudadano-news-secuencia.tar';
        a.click();
        URL.revokeObjectURL(tarUrl);

        zipBtn.disabled = false;
        capturing = false;
        recStatus.textContent = '✓ Archivo Descargado!';
        setTimeout(() => recStatus.textContent = '', 4000);
      } catch (err) {
        alert("Error: " + err.message);
        recStatus.textContent = 'Error!';
        capturing = false;
        document.getElementById('zipBtn').disabled = false;
      }
    });
  </script>

  <style>
    #wavBtn,
    #zipBtn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 3px;

      font-family: Arial, sans-serif;

    #wavBtn:hover,
    #zipBtn:hover {
      border-color: #F5A623;
      color: #F5A623;
    }

    #wavBtn:disabled,
    #zipBtn:disabled {
      opacity: 0.3;
      cursor: default;
    }
  </style>

  <script>
    (function () {
      async function stableRecord() {
        const canvas = document.querySelector('canvas');
        if (!canvas) { console.warn('No canvas found.'); return; }
        const stream = canvas.captureStream(30);
        let mime = '';
        const prefs = [
          'video/webm;codecs=vp9',
          'video/webm;codecs=vp8',
          'video/webm'
        ];
        for (const p of prefs) { if (MediaRecorder.isTypeSupported(p)) { mime = p; break; } }
        const chunks = [];
        const rec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        rec.onstop = () => {
          const blob = new Blob(chunks, { type: mime || 'video/webm' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'ciudadano-news-alpha.webm';
          a.click();
          setTimeout(() => URL.revokeObjectURL(a.href), 5000);
        };
        rec.start(250);
        setTimeout(() => rec.stop(), 4000);
      }
      window.stableRecord = stableRecord;
    })();
  </script>
