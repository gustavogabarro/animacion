<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  .scene { position: relative; width: 1080px; height: 400px; display: flex; align-items: center; justify-content: center; }
  .logo-full { position: absolute; display: flex; align-items: flex-end; gap: 3px; white-space: nowrap; }
  .glyph { display: inline-flex; align-items: flex-end; flex-shrink: 0; opacity: 0.15; transition: opacity 0.07s ease, filter 0.07s ease, transform 0.07s ease; transform-origin: bottom center; }
  .glyph.lit { opacity: 1; transform: scale(1.06); }
  .glyph.settled { transform: scale(1); }
  .glyph.white.lit { filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
  .glyph.yellow.lit { filter: drop-shadow(0 0 8px rgba(245,166,35,0.4)); }
  .glyph-dot { display: inline-flex; align-items: flex-end; padding-bottom: 2px; opacity: 1; flex-shrink: 0; filter: drop-shadow(0 0 0px #ffbf3c); transition: filter 0.15s ease, transform 0.15s ease; transform-origin: bottom center; }
  .glyph-dot.pulse { filter: drop-shadow(0 0 14px #ffbf3c) drop-shadow(0 0 28px rgba(255,191,60,0.5)); transform: scale(1.35); }
  .glyph-dot.settled { transform: scale(1); filter: drop-shadow(0 0 4px rgba(255,191,60,0.4)); }
  .logo-compact { position: absolute; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
  .logo-compact.pop-in { animation: popIn 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto; }
  .logo-compact svg { width: 100px; height: auto; }
  @keyframes popIn { 0% { opacity:0; transform:scale(0.55) translateY(8px); } 65% { opacity:1; transform:scale(1.08) translateY(-2px); } 100% { opacity:1; transform:scale(1) translateY(0); } }
  .logo-full.fade-out { animation: fadeOutFull 0.28s ease-in forwards; }
  @keyframes fadeOutFull { 0% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(0.9); } }
  .glow-ring { position:absolute; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle,rgba(255,191,60,0.07) 0%,transparent 70%); opacity:0; pointer-events:none; }
  .glow-ring.active { animation: glowPulse 2.8s ease-in-out infinite; }
  @keyframes glowPulse { 0%,100% { opacity:0.4; transform:scale(1); } 50% { opacity:1; transform:scale(1.4); } }
  .replay { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:transparent; border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.35); font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:7px 22px; cursor:pointer; border-radius:2px; font-family:Arial,sans-serif; transition:border-color 0.25s,color 0.25s,opacity 0.4s; opacity:0; }
  .replay:hover { border-color:#F5A623; color:#F5A623; }
  #recPanel { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; align-items:flex-end; gap:6px; z-index:999; }
  #recStatus { color:#F5A623; font-size:10px; letter-spacing:1px; font-family:Arial,sans-serif; min-height:14px; text-align:right; }
  #recNote { color:rgba(255,255,255,0.2); font-size:10px; letter-spacing:2px; font-family:Arial,sans-serif; text-transform:uppercase; text-align:right; }
  #recBtn { background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.4); font-size:11px; letter-spacing:3px; text-transform:uppercase; padding:8px 20px; cursor:pointer; border-radius:2px; font-family:Arial,sans-serif; transition:border-color 0.25s,color 0.25s; }
  #recBtn:hover { border-color:#F5A623; color:#F5A623; }
  #recBtn:disabled { opacity:0.3; cursor:default; }
</style>

  // Fix restart to use buildScene
  function restart() {
    const rb = document.getElementById('replayBtn');
    if (rb) rb.style.opacity = '0';
    buildScene(document.getElementById('scene'));
    void document.getElementById('scene').offsetWidth;
    runSequence();
  }

  // ── GRABACIÓN ───────────────────────────────────────────────────
  const recBtn    = document.getElementById('recBtn');
  const recStatus = document.getElementById('recStatus');
  let capturing = false;

  recBtn.addEventListener('click', async () => {
    if (capturing) return;
    capturing = true;
    recBtn.disabled = true;
    recStatus.textContent = 'Preparando...';

    const FPS      = 30;
    const DURATION = 3.8;
    const TOTAL_F  = Math.ceil(FPS * DURATION);
    const FRAME_MS = 1000 / FPS;

    const scene = document.getElementById('scene');
    const W = scene.offsetWidth;
    const H = scene.offsetHeight;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d', {alpha: true});

    const stream = canvas.captureStream(FPS);
    const chunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9' : 'video/webm';
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 15_000_000 });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, {type: 'video/webm'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'ciudadano-news-logo.webm'; a.click();
      URL.revokeObjectURL(url);
      recStatus.textContent = '&#10003; Descargado!';
      recBtn.disabled = false;
      recBtn.textContent = '&#9679; Grabar';
      recBtn.style.borderColor = '';
      recBtn.style.color = '';
      capturing = false;
      setTimeout(() => recStatus.textContent = '', 4000);
    };

    recorder.start(100);
    recBtn.textContent = '● Grabando...';
    recBtn.style.borderColor = '#F5A623';
    recBtn.style.color = '#F5A623';

    // Restart animation
    restart();
    const startTime = performance.now();

    for (let f = 0; f < TOTAL_F; f++) {
      const target = startTime + f * FRAME_MS;
      const diff   = target - performance.now();
      if (diff > 0) await new Promise(r => setTimeout(r, diff));

      // Draw current DOM state onto canvas via SVG foreignObject
      const sceneEl = document.getElementById('scene');
      const svgStr  = `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml" style="width:${W}px;height:${H}px;overflow:hidden;background:transparent;">
            ${sceneEl.innerHTML}
          </div>
        </foreignObject>
      </svg>`;

      const blob = new Blob([svgStr], {type: 'image/svg+xml'});
      const url  = URL.createObjectURL(blob);
      await new Promise((res) => {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, W, H);
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          res();
        };
        img.onerror = () => { URL.revokeObjectURL(url); res(); };
        img.src = url;
      });

      recStatus.textContent = `Capturando ${Math.round((f+1)/TOTAL_F*100)}% (${f+1}/${TOTAL_F})`;
    }

    recorder.stop();
  });

  // ── EXPORTAR AUDIO WAV ──────────────────────────────────────────
  // Renderiza el audio offline (más rápido que tiempo real) y descarga WAV
  document.getElementById('wavBtn').addEventListener('click', async () => {
    const wavBtn = document.getElementById('wavBtn');
    const recStatus = document.getElementById('recStatus');
    wavBtn.disabled = true;
    wavBtn.textContent = '⏳ Renderizando...';
    recStatus.textContent = 'Generando audio...';

    const DURATION   = 3.8;
    const SAMPLE_RATE = 44100;

    // OfflineAudioContext para renderizar sin tiempo real
    const offCtx = new OfflineAudioContext(2, SAMPLE_RATE * DURATION, SAMPLE_RATE);

    // Master compressor
    const comp = offCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 8;
    comp.ratio.value = 3; comp.attack.value = 0.003; comp.release.value = 0.18;

    // Reverb
    const irLen = SAMPLE_RATE * 1.8;
    const ir = offCtx.createBuffer(2, irLen, SAMPLE_RATE);
    for (let c = 0; c < 2; c++) {
      const ch = ir.getChannelData(c);
      for (let i = 0; i < irLen; i++) {
        ch[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 2.2) * (i<400 ? 0.4 : 1);
      }
    }
    const reverb = offCtx.createConvolver();
    reverb.buffer = ir;
    const reverbGain = offCtx.createGain();
    reverbGain.gain.value = 0.22;
    comp.connect(offCtx.destination);
    comp.connect(reverb); reverb.connect(reverbGain); reverbGain.connect(offCtx.destination);

    const m = comp; // master input

    // ── Helpers ──
    function osc(type, freq, startT, endT, gainEnv) {
      const o = offCtx.createOscillator();
      const g = offCtx.createGain();
      o.type = type; o.frequency.value = freq;
      gainEnv(g.gain, startT);
      o.connect(g); g.connect(m);
      o.start(startT); o.stop(endT);
    }
    function freqRamp(o, f1, f2, t1, t2) {
      o.frequency.setValueAtTime(f1, t1);
      o.frequency.exponentialRampToValueAtTime(f2, t2);
    }

    // ── DOT SPARK  t=0 ──
    const t0 = 0;
    // Chime
    const chime = offCtx.createOscillator();
    const chimeG = offCtx.createGain();
    chime.type = 'sine';
    chime.frequency.setValueAtTime(2093, t0);
    chime.frequency.exponentialRampToValueAtTime(3136, t0+0.05);
    chimeG.gain.setValueAtTime(0, t0);
    chimeG.gain.linearRampToValueAtTime(0.28, t0+0.008);
    chimeG.gain.exponentialRampToValueAtTime(0.0001, t0+0.22);
    chime.connect(chimeG); chimeG.connect(m);
    chime.start(t0); chime.stop(t0+0.25);
    // Sub click
    const sub0 = offCtx.createOscillator();
    const sub0G = offCtx.createGain();
    sub0.type = 'sine';
    sub0.frequency.setValueAtTime(180, t0);
    sub0.frequency.exponentialRampToValueAtTime(60, t0+0.08);
    sub0G.gain.setValueAtTime(0.32, t0);
    sub0G.gain.exponentialRampToValueAtTime(0.0001, t0+0.1);
    sub0.connect(sub0G); sub0G.connect(m);
    sub0.start(t0); sub0.stop(t0+0.12);

    // ── LETTER TICKS — pentatonic ascending ──
    // STEP=40ms, FIRST=80ms, 9 steps
    const SCALE = [293.66,329.63,369.99,440,493.88,587.33,659.25,739.99,880];
    const FIRST = 0.08, STEP = 0.04;
    for (let i = 0; i < 9; i++) {
      const t  = FIRST + i * STEP;
      const freq = SCALE[Math.min(i, SCALE.length-1)];
      // Bell tick
      [[1,1],[2.756,0.35],[5.404,0.15]].forEach(([ratio, rel]) => {
        const o = offCtx.createOscillator();
        const g = offCtx.createGain();
        o.type = 'triangle';
        o.frequency.value = freq * ratio;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.13 * rel, t+0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t+0.28);
        o.connect(g); g.connect(m);
        o.start(t); o.stop(t+0.3);
      });
      // Octave shimmer on later steps
      if (i > 3) {
        const o2 = offCtx.createOscillator();
        const g2 = offCtx.createGain();
        o2.type = 'triangle'; o2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0, t);
        g2.gain.linearRampToValueAtTime(0.045, t+0.008);
        g2.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
        o2.connect(g2); g2.connect(m);
        o2.start(t); o2.stop(t+0.2);
      }
    }

    // ── FINAL IMPACT — t ≈ allLit + 260ms ──
    // allLit = 0.08 + 8*0.04 + 0.16 = 0.56, +0.26 = 0.82
    const tImpact = 0.82;
    // Sub thud
    const subF = offCtx.createOscillator();
    const subFG = offCtx.createGain();
    subF.type = 'sine';
    subF.frequency.setValueAtTime(98, tImpact);
    subF.frequency.exponentialRampToValueAtTime(55, tImpact+0.22);
    subFG.gain.setValueAtTime(0, tImpact);
    subFG.gain.linearRampToValueAtTime(0.5, tImpact+0.01);
    subFG.gain.exponentialRampToValueAtTime(0.0001, tImpact+0.3);
    subF.connect(subFG); subFG.connect(m);
    subF.start(tImpact); subF.stop(tImpact+0.32);
    // Arpeggio D5-F#5-A5
    [{freq:587.33,delay:0,pan:-0.3,vol:0.22,dec:0.9},
     {freq:739.99,delay:0.035,pan:0,vol:0.20,dec:0.85},
     {freq:880,delay:0.07,pan:0.3,vol:0.18,dec:1.1}
    ].forEach(({freq,delay,pan,vol,dec}) => {
      const t = tImpact + delay;
      const panner = offCtx.createStereoPanner();
      panner.pan.value = pan; panner.connect(m);
      [[1,1],[2.756,0.28],[5.404,0.1]].forEach(([ratio,rel]) => {
        const o = offCtx.createOscillator();
        const g = offCtx.createGain();
        o.type = 'sine'; o.frequency.value = freq * ratio;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(vol*rel, t+0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dec);
        o.connect(g); g.connect(panner);
        o.start(t); o.stop(t+dec+0.05);
      });
    });
    // Shimmer tail A6
    const tail = offCtx.createOscillator();
    const tailG = offCtx.createGain();
    tail.type = 'sine'; tail.frequency.value = 1760;
    tailG.gain.setValueAtTime(0, tImpact+0.07);
    tailG.gain.linearRampToValueAtTime(0.09, tImpact+0.12);
    tailG.gain.exponentialRampToValueAtTime(0.0001, tImpact+1.4);
    tail.connect(tailG); tailG.connect(m);
    tail.start(tImpact+0.07); tail.stop(tImpact+1.45);

    // ── Render & encode WAV ──
    const rendered = await offCtx.startRendering();

    // Encode to WAV (PCM 16-bit stereo)
    function encodeWAV(audioBuffer) {
      const numCh  = audioBuffer.numberOfChannels;
      const numSamples = audioBuffer.length;
      const sampleRate = audioBuffer.sampleRate;
      const bitsPerSample = 16;
      const byteRate = sampleRate * numCh * bitsPerSample / 8;
      const blockAlign = numCh * bitsPerSample / 8;
      const dataSize = numSamples * numCh * bitsPerSample / 8;
      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);
      function writeStr(off, str) { for (let i=0;i<str.length;i++) view.setUint8(off+i, str.charCodeAt(i)); }
      writeStr(0,'RIFF');
      view.setUint32(4, 36+dataSize, true);
      writeStr(8,'WAVE');
      writeStr(12,'fmt ');
      view.setUint32(16,16,true);
      view.setUint16(20,1,true);
      view.setUint16(22,numCh,true);
      view.setUint32(24,sampleRate,true);
      view.setUint32(28,byteRate,true);
      view.setUint16(32,blockAlign,true);
      view.setUint16(34,bitsPerSample,true);
      writeStr(36,'data');
      view.setUint32(40,dataSize,true);
      let offset = 44;
      const channels = [];
      for (let c=0;c<numCh;c++) channels.push(audioBuffer.getChannelData(c));
      for (let i=0;i<numSamples;i++) {
        for (let c=0;c<numCh;c++) {
          const s = Math.max(-1, Math.min(1, channels[c][i]));
          view.setInt16(offset, s < 0 ? s*0x8000 : s*0x7FFF, true);
          offset += 2;
        }
      }
      return buffer;
    }

    const wavBuffer = encodeWAV(rendered);
    const wavBlob   = new Blob([wavBuffer], {type:'audio/wav'});
    const wavUrl    = URL.createObjectURL(wavBlob);
    const a         = document.createElement('a');
    a.href = wavUrl; a.download = 'ciudadano-news-audio.wav'; a.click();
    URL.revokeObjectURL(wavUrl);

    wavBtn.disabled = false;
    wavBtn.textContent = '♪ Descargar audio WAV';
    recStatus.textContent = '✓ Audio descargado!';
    setTimeout(() => recStatus.textContent = '', 3000);
  });
</script>
