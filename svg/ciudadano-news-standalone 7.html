        // Función para construir la escena (usando el JSON integrado) [4, 5]

            runSequence();

            // Configuración crítica para canal alfa en Chrome [3]
            const options = {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 15000000 
            };

            const mediaRecorder = new MediaRecorder(stream, options);
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'ciudadano_news_alfa.webm';
                a.click();
                
                recBtn.disabled = false;
                capturing = false;
                recStatus.textContent = '¡Video WebM generado!';
            };

            // Iniciar grabación y disparar animación real simultáneamente

            restart();
            recStatus.textContent = 'Grabando animación real...';

                if (mediaRecorder.state !== "inactive") {

                }
