<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciudadano.news — Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 1080px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── FULL LOGO ── */
  .logo-full {
    position: absolute;
    display: flex;
    align-items: flex-end;   /* baseline-align via bottom edge */
    gap: 3px;
    white-space: nowrap;
  }

  /* Each letter wrapper */
  .glyph {
    display: inline-flex;
    align-items: flex-end;
    flex-shrink: 0;
    opacity: 0.15;
    transition: opacity 0.07s ease, filter 0.07s ease, transform 0.07s ease;
    transform-origin: bottom center;
  }
  .glyph img {
    display: block;
    /* width/height set inline per letter */
  }
  .glyph.lit {
    opacity: 1;
    transform: scale(1.06);
  }
  .glyph.settled {
    transform: scale(1);
  }

  /* Dot — special: always orange, pulses */
  .glyph-dot {
    display: inline-flex;
    align-items: flex-end;
    padding-bottom: 2px;   /* sit right at baseline */
    opacity: 1;
    flex-shrink: 0;
    filter: drop-shadow(0 0 0px #ffbf3c);
    transition: filter 0.15s ease, transform 0.15s ease;
    transform-origin: bottom center;
  }
  .glyph-dot img { display: block; }
  .glyph-dot.pulse {
    filter: drop-shadow(0 0 10px #ffbf3c) drop-shadow(0 0 22px rgba(255,191,60,0.6));
    transform: scale(1.5);
  }
  .glyph-dot.settled {
    transform: scale(1);
    filter: drop-shadow(0 0 4px rgba(255,191,60,0.5));
  }

  /* white glyph glow on lit */
  .glyph.white.lit {
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  }
  /* yellow glyph glow on lit */
  .glyph.yellow.lit {
    filter: drop-shadow(0 0 8px rgba(255,191,60,0.4));
  }

  /* Fade out full logo */
  .logo-full.fade-out {
    animation: fadeOutFull 0.28s ease-in forwards;
  }
  @keyframes fadeOutFull {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.9); }
  }

  /* ── COMPACT LOGO ── */
  .logo-compact {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }
  .logo-compact.pop-in {
    animation: popIn 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    pointer-events: auto;
  }
  .logo-compact img {
    width: 1020px;
    height: auto;
  }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.55) translateY(8px); }
    65%  { opacity: 1; transform: scale(1.08) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Glow ring */
  .glow-ring {
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,191,60,0.07) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
  }
  .glow-ring.active {
    animation: glowPulse 2.8s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.4); }
  }

  /* Replay */
  .replay {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 7px 22px;
    cursor: pointer;
    border-radius: 2px;
    font-family: Arial, sans-serif;
    transition: border-color 0.25s, color 0.25s, opacity 0.4s;
    opacity: 0;
  }
  .replay:hover { border-color: #ffbf3c; color: #ffbf3c; }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- FULL LOGO — letters as SVG images aligned to baseline -->
  <div class="logo-full" id="logoFull">

    <!-- Ciudadano (white, left side) -->
    <span class="glyph white" id="l0"><img src="1c.svg"       width="35"  height="54" alt="C"></span>
    <span class="glyph white" id="l1"><img src="2i.svg"       width="15"  height="54" alt="i"></span>
    <span class="glyph white" id="l2"><img src="3u_white.svg" width="34"  height="39" alt="u"></span>
    <span class="glyph white" id="l3"><img src="4d.svg"       width="35"  height="54" alt="d"></span>
    <span class="glyph white" id="l4"><img src="5a.svg"       width="33"  height="39" alt="a"></span>
    <span class="glyph white" id="l5"><img src="6d_2.svg"     width="35"  height="54" alt="d"></span>
    <span class="glyph white" id="l6"><img src="7a_2.svg"     width="33"  height="39" alt="a"></span>
    <span class="glyph white" id="l7"><img src="8n_white.svg" width="34"  height="39" alt="n"></span>
    <span class="glyph white" id="l8"><img src="9o_white.svg" width="35"  height="39" alt="o"></span>

    <!-- Dot -->
    <span class="glyph-dot" id="dot"><img src="10_dot.svg" width="10" height="10" alt="."></span>

    <!-- news (yellow, right side) -->
    <span class="glyph yellow" id="n0"><img src="11n_yellow.svg" width="41" height="39" alt="n"></span>
    <span class="glyph yellow" id="n1"><img src="12e_yellow.svg" width="37" height="39" alt="e"></span>
    <span class="glyph yellow" id="n2"><img src="13w_yellow.svg" width="58" height="39" alt="w"></span>
    <span class="glyph yellow" id="n3"><img src="14s_yellow.svg" width="33" height="39" alt="s"></span>

  </div>

  <!-- COMPACT LOGO -->
  <div class="logo-compact" id="logoCompact">
    <img src="15cnews.svg" alt="Ciudadano.news">
  </div>

  <div class="glow-ring" id="glowRing"></div>
</div>

<button class="replay" id="replayBtn" onclick="restart()">↺ Replay</button>

<script>
  const STEP         = 40;
  const FIRST_LETTER = 80;
  const leftLetters  = ['l8','l7','l6','l5','l4','l3','l2','l1','l0']; // o → C
  const rightLetters = ['n0','n1','n2','n3'];                            // n → s

  // ── AUDIO ENGINE ──────────────────────────────────────────
  let audioCtx = null;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function getMaster(ctx) {
    const c = ctx.createDynamicsCompressor();
    c.threshold.value = -12; c.ratio.value = 4;
    c.connect(ctx.destination); return c;
  }
  function playDotSpark() {
    const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(1800, now);
    o.frequency.exponentialRampToValueAtTime(2800, now + 0.06);
    g.gain.setValueAtTime(0.35, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.connect(g); g.connect(m); o.start(now); o.stop(now + 0.13);
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
    const s = ctx.createBufferSource(), gn = ctx.createGain();
    s.buffer = buf; gn.gain.setValueAtTime(0.18, now);
    gn.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    s.connect(gn); gn.connect(m); s.start(now);
  }
  function playLetterTick(i, total) {
    const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;
    const freq = 400 + (i / (total-1)) * 800;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(freq, now);
    o.frequency.exponentialRampToValueAtTime(freq * 1.15, now + 0.04);
    g.gain.setValueAtTime(0.12, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    o.connect(g); g.connect(m); o.start(now); o.stop(now + 0.07);
  }
  function playFinalImpact() {
    const ctx = getCtx(), m = getMaster(ctx), now = ctx.currentTime;
    const sub = ctx.createOscillator(), subG = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(80, now);
    sub.frequency.exponentialRampToValueAtTime(40, now + 0.18);
    subG.gain.setValueAtTime(0.55, now);
    subG.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    sub.connect(subG); subG.connect(m); sub.start(now); sub.stop(now + 0.26);
    [[880,.12],[1100,.09],[1320,.07]].forEach(([f,v],i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(v, now+0.03+i*0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.5);
      o.connect(g); g.connect(m); o.start(now); o.stop(now+0.55);
    });
    const sw = ctx.createOscillator(), swG = ctx.createGain(), swF = ctx.createBiquadFilter();
    swF.type = 'lowpass';
    swF.frequency.setValueAtTime(300, now);
    swF.frequency.exponentialRampToValueAtTime(2000, now+0.4);
    sw.type = 'sawtooth';
    sw.frequency.setValueAtTime(220, now);
    sw.frequency.exponentialRampToValueAtTime(440, now+0.4);
    swG.gain.setValueAtTime(0.18, now);
    swG.gain.exponentialRampToValueAtTime(0.001, now+0.45);
    sw.connect(swF); swF.connect(swG); swG.connect(m);
    sw.start(now); sw.stop(now+0.46);
  }
  // ──────────────────────────────────────────────────────────

  function litUp(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('lit');
    setTimeout(() => el.classList.add('settled'), 110);
  }

  function runSequence() {
    const maxSteps = Math.max(leftLetters.length, rightLetters.length);
    const allLit   = FIRST_LETTER + (maxSteps - 1) * STEP + 160;

    // 1. Dot spark
    playDotSpark();
    const dot = document.getElementById('dot');
    if (dot) { dot.classList.add('pulse'); setTimeout(() => dot.classList.add('settled'), 220); }

    // 2. Letters expand bidirectionally with ascending ticks
    for (let i = 0; i < maxSteps; i++) {
      const t = FIRST_LETTER + i * STEP;
      setTimeout(() => {
        playLetterTick(i, maxSteps);
        if (i < leftLetters.length)  litUp(leftLetters[i]);
        if (i < rightLetters.length) litUp(rightLetters[i]);
      }, t);
    }

    // 3. Fade out full logo
    setTimeout(() => {
      const full = document.getElementById('logoFull');
      if (full) full.classList.add('fade-out');
    }, allLit);

    // 4. Pop in compact + impact sound
    setTimeout(() => {
      playFinalImpact();
      const compact = document.getElementById('logoCompact');
      const glow    = document.getElementById('glowRing');
      if (compact) compact.classList.add('pop-in');
      if (glow)    glow.classList.add('active');
      setTimeout(() => {
        const btn = document.getElementById('replayBtn');
        if (btn) btn.style.opacity = '1';
      }, 600);
    }, allLit + 260);
  }

  function restart() {
    document.getElementById('replayBtn').style.opacity = '0';
    const scene = document.getElementById('scene');
    scene.innerHTML = `
      <div class="logo-full" id="logoFull">
        <span class="glyph white" id="l0"><img src="1c.svg"       width="35"  height="54" alt="C"></span>
        <span class="glyph white" id="l1"><img src="2i.svg"       width="15"  height="54" alt="i"></span>
        <span class="glyph white" id="l2"><img src="3u_white.svg" width="34"  height="39" alt="u"></span>
        <span class="glyph white" id="l3"><img src="4d.svg"       width="35"  height="54" alt="d"></span>
        <span class="glyph white" id="l4"><img src="5a.svg"       width="33"  height="39" alt="a"></span>
        <span class="glyph white" id="l5"><img src="6d_2.svg"     width="35"  height="54" alt="d"></span>
        <span class="glyph white" id="l6"><img src="7a_2.svg"     width="33"  height="39" alt="a"></span>
        <span class="glyph white" id="l7"><img src="8n_white.svg" width="34"  height="39" alt="n"></span>
        <span class="glyph white" id="l8"><img src="9o_white.svg" width="35"  height="39" alt="o"></span>
        <span class="glyph-dot" id="dot"><img src="10_dot.svg" width="10" height="10" alt="."></span>
        <span class="glyph yellow" id="n0"><img src="11n_yellow.svg" width="41" height="39" alt="n"></span>
        <span class="glyph yellow" id="n1"><img src="12e_yellow.svg" width="37" height="39" alt="e"></span>
        <span class="glyph yellow" id="n2"><img src="13w_yellow.svg" width="58" height="39" alt="w"></span>
        <span class="glyph yellow" id="n3" style="margin-left:-6px;"><img src="14s_yellow.svg" width="33" height="39" alt="s"></span>
      </div>
      <div class="logo-compact" id="logoCompact">
        <img src="15cnews.svg" alt="Ciudadano.news">
      </div>
      <div class="glow-ring" id="glowRing"></div>
    `;
    void scene.offsetWidth;
    runSequence();
  }

  runSequence();
</script>
</body>
</html>
